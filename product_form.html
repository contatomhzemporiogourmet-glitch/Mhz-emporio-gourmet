
{% extends "base.html" %}{% block title %}Produto · MHZ ERP{% endblock %}{% block content %}
<div class="page-head"><div><h1>{% if product %}Editar produto{% else %}Novo produto{% endif %}</h1></div></div>
<form class="card form-grid" method="post">
<label>Código<input name="code" required value="{{ product.code if product else '' }}"></label>
<label>Categoria<input name="category" required value="{{ product.category if product else '' }}"></label>
<label>Marca<input name="brand" required value="{{ product.brand if product else '' }}"></label>
<label class="wide">Produto<input name="name" required value="{{ product.name if product else '' }}"></label>
<label>Peso<input name="weight" value="{{ product.weight if product else '' }}"></label>
<label>Fornecedor<input name="supplier" value="{{ product.supplier if product else '' }}"></label>
<label>Custo<input type="number" step="0.01" name="cost" value="{{ product.cost if product else 0 }}"></label>
<label>Embalagem<input type="number" step="0.01" name="packaging" value="{{ product.packaging if product else 0 }}"></label>
<label>Outros custos<input type="number" step="0.01" name="other_costs" value="{{ product.other_costs if product else 0 }}"></label>
<label>Preço de venda<input type="number" step="0.01" name="sale_price" value="{{ product.sale_price if product else 0 }}"></label>
<label>Estoque atual<input type="number" name="current_stock" value="{{ product.current_stock if product else 0 }}"></label>
<label>Estoque mínimo<input type="number" name="min_stock" value="{{ product.min_stock if product else 1 }}"></label>
<label>Status<select name="status"><option {% if not product or product.status=='Ativo' %}selected{% endif %}>Ativo</option><option {% if product and product.status=='Inativo' %}selected{% endif %}>Inativo</option></select></label>
<div class="actions wide"><a class="btn" href="{{ url_for('products') }}">Cancelar</a><button class="btn primary" type="submit">Salvar</button></div>
</form>{% endblock %}
